<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Laplace — el campo que se asienta</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%2307080d'/><circle cx='16' cy='16' r='7' fill='%23f0a95c'/></svg>" />

<style>
  :root{
    --bg:#07080d;
    --ink:#f4e3c1;
    --ink-dim:#8a7a5e;
    --amber:#f0a95c;
    --rule:rgba(240,169,92,0.18);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;color:var(--ink);overflow:hidden;
    font-family:'Spectral',serif;font-weight:300;
    -webkit-font-smoothing:antialiased;
    /* atmósfera: glow ámbar tenue hacia el horizonte sobre negro.
       El canvas se dibuja con fondo transparente y deja ver esto donde
       no hay superficie (el "cielo"). */
    background:
      radial-gradient(ellipse 95% 60% at 50% 46%, rgba(240,169,92,0.11), rgba(7,8,13,0) 62%),
      var(--bg);
  }
  canvas#c{position:fixed;inset:0;display:block;cursor:crosshair;
    touch-action:none}  /* evita que el arrastre haga scroll/zoom en móvil */

  /* vignette + grain */
  #vignette{position:fixed;inset:0;pointer-events:none;z-index:3;
    box-shadow:inset 0 0 260px rgba(0,0,0,0.78), inset 0 0 60px rgba(0,0,0,0.5)}
  #grain{position:fixed;inset:0;pointer-events:none;z-index:6;opacity:0.08;mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.95  0 0 0 0 0.85  0 0 0 0 0.65  0 0 0 1 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>")}

  /* firma: la ecuación rectora (issue #5) — tenue, tipográfica, no chrome */
  #eq{position:fixed;right:clamp(12px,3vw,30px);bottom:clamp(12px,3vw,26px);z-index:5;
    pointer-events:none;color:var(--amber);opacity:0;
    font:300 clamp(12px,1.6vw,16px)/1 'Spectral',serif;letter-spacing:.06em;
    text-shadow:0 0 18px rgba(240,169,92,0.25);
    animation:eqIn 2.6s ease .5s forwards}
  @keyframes eqIn{to{opacity:.24}}

  /* sigilo del pincel: condición Dirichlet ±φ durante el pintado (issue #9) */
  #sig{position:fixed;z-index:5;display:none;pointer-events:none;
    transform:translate(-50%,-150%);color:var(--ink);
    font:300 clamp(14px,1.8vw,20px)/1 'Spectral',serif;
    text-shadow:0 0 14px rgba(240,169,92,0.45)}

  /* respeta reduced-motion (issue #10): sin fade ni respiración de cámara */
  @media (prefers-reduced-motion:reduce){
    #eq{animation:none;opacity:.24}
  }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="eq">∇²φ = 0</div>
<div id="sig">+φ</div>

<div id="vignette"></div>
<div id="grain"></div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
