<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Laplace — el campo que se asienta</title>
<meta name="description" content="Un campo escalar que obedece ∇²φ = 0, resuelto en GPU y pintado a mano: el potencial se relaja hasta asentarse." />
<meta property="og:title" content="Laplace — el campo que se asienta" />
<meta property="og:description" content="Un campo escalar que obedece ∇²φ = 0, resuelto en GPU y pintado a mano." />
<meta property="og:type" content="website" />
<meta property="og:image" content="./og.png" />
<meta name="twitter:card" content="summary_large_image" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%2307080d'/><circle cx='16' cy='16' r='7' fill='%23f0a95c'/></svg>" />

<style>
  :root{
    --bg:#04050a;
    --ink:#dfeaf6;
    --neon:#7fe6ff;     /* cian de acento */
    --sans:-apple-system,BlinkMacSystemFont,"Inter","Helvetica Neue",Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;color:var(--ink);overflow:hidden;
    font-family:var(--sans);font-weight:500;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
    background:var(--bg);
  }
  canvas#c{position:fixed;inset:0;display:block;cursor:crosshair;
    touch-action:none}  /* evita que el arrastre haga scroll/zoom en móvil */

  /* ---- Tipografía limpia (data-viz, estilo Rauno) ---- */
  #ui{position:fixed;top:clamp(16px,3.4vh,36px);left:clamp(16px,3vw,42px);z-index:5;
    pointer-events:none;color:var(--ink);opacity:0;animation:fadeIn 1.4s ease .4s forwards}
  #ui .t{font-size:13px;letter-spacing:.24em;text-transform:uppercase;font-weight:600}
  #ui .s{font-size:11px;letter-spacing:.05em;opacity:.45;margin-top:3px}
  #ui .eq{font-size:12px;letter-spacing:.04em;opacity:.6;margin-top:16px;color:var(--neon)}

  #legend{position:fixed;left:clamp(16px,3vw,42px);bottom:clamp(16px,3.4vh,32px);z-index:5;
    pointer-events:none;display:flex;align-items:center;gap:9px;opacity:0;animation:fadeIn 1.4s ease .7s forwards;
    font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink)}
  #legend .l{opacity:.5}
  #legend .bar{width:clamp(80px,12vw,140px);height:3px;border-radius:2px;
    background:linear-gradient(90deg,#00e5ff,#6a3cff,#191922,#c026ff,#ff2bd0)}

  #hint{position:fixed;right:clamp(16px,3vw,42px);bottom:clamp(16px,3.4vh,32px);z-index:5;
    pointer-events:none;text-align:right;opacity:0;animation:fadeIn 1.4s ease 1s forwards;
    font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink);line-height:1.7}
  #hint b{color:var(--ink);opacity:.5;font-weight:600}
  #hint span{opacity:.32}

  @keyframes fadeIn{to{opacity:1}}

  /* sigilo del pincel: condición Dirichlet ±φ durante el pintado */
  #sig{position:fixed;z-index:5;display:none;pointer-events:none;
    transform:translate(-50%,-150%);color:var(--neon);
    font:600 clamp(12px,1.4vw,15px)/1 var(--sans);letter-spacing:.04em}

  @media (prefers-reduced-motion:reduce){
    #ui,#legend,#hint{animation:none;opacity:1}
  }

  /* fallback sin soporte de float render targets: la ecuación, centrada */
  body.nofield #c,body.nofield #legend,body.nofield #hint,
  body.nofield #ui .t,body.nofield #ui .s{display:none}
  body.nofield #ui{inset:0;display:flex;align-items:center;justify-content:center;animation:none;opacity:1}
  body.nofield #ui .eq{margin:0;font-size:clamp(28px,7vw,64px);opacity:.65}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="ui">
  <div class="t">Laplace</div>
  <div class="s">el campo que se asienta</div>
  <div class="eq">∇²φ = 0</div>
</div>
<div id="legend"><span class="l">−</span><span class="bar"></span><span class="l">+</span><span class="l" style="margin-left:5px">φ</span></div>
<div id="hint"><span><b>clic</b> +φ&nbsp;&nbsp;·&nbsp;&nbsp;<b>der</b> −φ&nbsp;&nbsp;·&nbsp;&nbsp;<b>medio</b> borra<br><b>rueda</b> tamaño&nbsp;&nbsp;·&nbsp;&nbsp;<b>R</b> reinicia</span></div>
<div id="sig">+φ</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
